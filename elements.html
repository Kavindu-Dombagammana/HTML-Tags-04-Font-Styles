<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            background-color: blue;
            width: 600px;
        }
        h1{
            background-color: brown;
        }
        #box1{
            background-color: violet;
        }
        span{
            background-color: chartreuse;
        }
        /* Inline or block elements cannot be added for div tags since it doesn't apply for the tags under the div tags but only the div tags */
        /* #box3{
            display: inline;
            background-color: blueviolet;
        }
        #box4{
            display: block;
        } */
         .inline{
            display: inline;
         }
         .block{
            display: block;
         }
    </style>
</head>
<body>
    <a href="index.html">home</a>
    <a href="elements.html">elements</a>
    <a href="floats.html">float</a>
    <!--BLock elements takes the whole line of the web page-->
    <!--Black level elements doesn't paste content on the same line no matter what the width is -->
    <div id="box">
        <h1>Hello</h1>
        <h1>World 01</h1>
    </div>


    <!--Inline elements takes the width of the content so multiple content displays on the same line-->
    
    <div id="box1">
        <span>Hello</span>
        <span>World02</span>
    </div>

    <!--Change block level into inline level elements-->
    <div id="box3">
        <h1 class="inline">Hello</h1>
        <h1 class="inline">World 03</h1>
    </div>


    <div id="box4"> 
        <span class="block">Hello</span>
        <span class="block">World</span>
    </div>
</body>
</html>
